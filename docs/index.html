<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Stress Monitor - Web Flasher</title>
    <script type="module" src="https://unpkg.com/esp-web-tools@9.0.2/dist/web/install-button.js?module"></script>
    <style>
        /* Your styling */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            text-align: center;
        }
        esp-web-install-button {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💧 Water Stress Monitor</h1>
        <p>Click the button below to install the firmware</p>
        
        <esp-web-install-button
            manifest="./manifest.json"
        ></esp-web-install-button>
        
        <div class="info-box">
            <strong>After flashing:</strong><br>
            1. Connect to "WaterStress_Config" WiFi<br>
            2. Visit http://192.168.4.1<br>
            3. Configure your WiFi
        </div>
    </div>
</body>
</html>
